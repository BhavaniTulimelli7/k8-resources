kind: Service
apiVersion: v1
metadata:
  name: nginx-headless
  labels:
    app: nginx
    demo: statefulset
spec:
  ports:
  - port: 80
    name: web
  clusterIP: None
  selector:
    app: nginx
---
kind: StatefulSet
apiVersion: apps/v1
metadata:
  name: nginx
spec:
  serviceName: nginx-headless
  replicas: 3
  minReadySeconds: 10
  selector:
    matchLabels:
      app: nginx
      demo: statefulset
  template:
    metadata:
      labels:
        app: nginx
        demo: statefulset
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: nginx
        image: registry.k8s.io/nginx-slim:0.24
        ports:
        - containerPort: 80
          name: web
        volumeMounts:
        - name: www
          mountPath: /usr/share/nginx/html
    volumeClaimTemplates:
    - metadata:
        name: www
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: "ebs-sc"
        resources:
          requests:
            storage: 1Gi
